name: $(Date:yyMMdd).00.$(Rev:r)

trigger:
  branches:
    include:
    - main
  paths:
    include:
    - apiserver/**
    - frontend/**

pr:
  branches:
    include:
    - main
  paths:
    include:
    - apiserver/**
    - frontend/**

resources:
  repositories:
  - repository: templates
    type: github
    name: dkhalife/Pipeline.Templates
    endpoint: github
    ref: refs/tags/latest

extends:
  template: pipeline.yml@templates
  parameters:
    stages:
    - stage: build
      templateContext:
        intent: build
      jobs:
      - job: test
        templateContext:
          go:
          - name: api
            goVersion: '1.25'
            workingDirectory: apiserver
            buildArgs: >-
              -v
              -ldflags "-X taskwiz.app/core/internal/version.Version=$(Build.BuildNumber)
              -X taskwiz.app/core/internal/version.BuildNumber=$(Build.BuildId)
              -X taskwiz.app/core/internal/version.CommitHash=$(Build.SourceVersion)"
              ./...
            testArgs: '-v -coverprofile=coverage.txt ./...'
            vet: false
    # No approval gate — continuous deploy.
    - stage: push_canary
      templateContext:
        intent: build
      jobs:
      - job: image
        condition: ne(variables['Build.Reason'], 'PullRequest')
        templateContext:
          containerImage:
          - name: api
            repository: task-wizard-api
            dockerfile: apiserver/Dockerfile
            context: .
            extraTag: canary
            buildArgs: >-
              --build-arg VERSION=$(Build.BuildNumber)
              --build-arg BUILD_NUMBER=$(Build.BuildId)
              --build-arg COMMIT_HASH=$(Build.SourceVersion)
              --build-arg VITE_BACKEND_VERSION=$(Build.BuildNumber)
    # No production tier yet — nothing consumes the :release tag today.
